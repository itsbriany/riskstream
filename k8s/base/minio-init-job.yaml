apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio-init
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minio-init
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minio-init
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: minio-init
subjects:
- kind: ServiceAccount
  name: minio-init
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: minio-init
    spec:
      serviceAccountName: minio-init
      restartPolicy: OnFailure
      containers:
      - name: init-buckets
        image: minio/mc:latest
        env:
        - name: MINIO_ENDPOINT
          value: "minio:9000"
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: root-user
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: minio-secret
              key: root-password
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        command:
        - /bin/sh
        - /scripts/init-minio-buckets.sh
        volumeMounts:
        - name: scripts
          mountPath: /scripts
          readOnly: true
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: scripts
        configMap:
          name: minio-init-scripts
          defaultMode: 0555
